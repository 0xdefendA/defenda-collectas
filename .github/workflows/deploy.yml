name: Deploy Collectors

on:
  push:
    branches:
      - main
    paths:
      - 'collectors/**'
      - 'shared/**'
      - '.github/workflows/deploy.yml'
      - 'terraform/**'

# Required for Workload Identity Federation
permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO_NAME: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/collectors
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Authenticate using Workload Identity Federation
      # and GET an access token
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
            - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      # - name: Configure Docker auth
      #   run: gcloud auth configure-docker us-central1-docker.pkg.dev 
      # 2. Log in to Docker DIRECTLY
      # - name: 'Docker Login'
      #   run: |
      #     echo "${{ steps.auth.outputs.access_token }}" | docker login -u oauth2access_token --password-stdin https://us-central1-docker.pkg.dev      
      # 2. Log in to Docker using the specialized Login Action (Fixes TTY issues)
      - name: 'Login to Artifact Registry'
        uses: 'docker/login-action@v3'
        with:
          registry: 'us-central1-docker.pkg.dev'
          username: 'oauth2access_token'
          password: '${{ steps.auth.outputs.access_token }}'


      - name: Build and push Google Workspace Docker image
        run: |
          docker build -t ${{ env.REPO_NAME }}/google-workspace-collector:latest -f collectors/google_workspace/Dockerfile .
          docker push ${{ env.REPO_NAME }}/google-workspace-collector:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_pubsub_topic_name: "google-workspace-events"
          TF_VAR_collectors: >
            {
              "google_workspace" = {
                "enabled" = true,
                "image"   = "${{ env.REPO_NAME }}/google-workspace-collector:latest",
                "schedule" = "0 * * * *",
                "env_vars" = {
                  "APPLICATION_NAMES" = "login,admin,token,drive"
                },
                "secret_env_vars" = {
                  "GOOGLE_WORKSPACE_DELEGATED_ACCOUNT" = "${{ secrets.GOOGLE_WORKSPACE_DELEGATED_ACCOUNT }}"
                }
              }
            }
